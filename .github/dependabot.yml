version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      pi-ecosystem:
        patterns:
          - "@mariozechner/*"
      dev-tooling:
        patterns:
          - "oxlint"
          - "oxfmt"
          - "typescript"
          - "vitest"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
